---
driver:
  name: vagrant

provisioner:
  name: chef_zero
  deprecations_as_errors: true
  chef_license: accept
  product_name: chef
  product_version: <%= ENV['CHEF_VERSION'] || 'latest' %>
  install_strategy: once
  log_level: <%= ENV['CHEF_LOG_LEVEL'] || 'auto' %>

verifier:
  name: inspec

platforms:
  - name: almalinux-8
  - name: almalinux-9
  - name: almalinux-10
  # - name: amazonlinux-2023  # systemd-sysv-install missing in Dokken image
  - name: centos-stream-9
  - name: centos-stream-10
  - name: debian-12
  # - name: debian-13  # Elastic 7.x GPG key uses SHA1, rejected by Debian 13
  - name: fedora-latest
  - name: opensuse-leap-15
  - name: oraclelinux-8
  - name: oraclelinux-9
  - name: rockylinux-8
  - name: rockylinux-9
  - name: rockylinux-10
  - name: ubuntu-20.04
  - name: ubuntu-22.04
  - name: ubuntu-24.04

# Reusable YAML anchors for run_lists
x-run_lists:
  default: &default_run_list
    - recipe[test::default]
  default_with_plugins: &plugins_run_list
    - recipe[test::default_with_plugins]

suites:
  - name: default
    run_list: *default_run_list

  - name: repository
    run_list: *plugins_run_list
    attributes:
      elasticsearch:
        install:
          type: repository

  - name: package
    run_list: *plugins_run_list
    attributes:
      elasticsearch:
        install:
          type: package
